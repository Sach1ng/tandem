<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Pip</title>
  </head>
  <body>
    <header>
      <div class="brand-wrap">
        <span class="brand">Pip</span>
        <span class="brand-sub">your AI coworker</span>
      </div>
      <span id="status" class="status">● checking…</span>
    </header>

    <div id="context" class="context">Reading page…</div>
    <div id="hint" class="hint" hidden></div>
    <div id="suggestions" class="suggestions"></div>

    <textarea id="q" rows="2" placeholder="Ask, or tell Pip what to do… (⌘/Ctrl + ↵)"></textarea>
    <div class="actions">
      <button id="ask" class="btn ask">Ask Pip</button>
      <button id="assign" class="btn assign" title="Capture this as a task and run it on Pip">Assign to Pip</button>
    </div>

    <div id="assigned" class="assigned" hidden></div>
    <div id="answer" class="answer"></div>

    <script src="popup.js"></script>
  </body>
</html>
