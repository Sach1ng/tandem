<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pip · Tandem</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="mode-collapsed mood-rest">
    <div id="pip-stage" class="pip-stage">
    <div id="collapsed" class="orb-shell pip-surface pip-surface-collapsed" aria-label="Pip">
      <div class="buddy">
        <span class="antenna left" aria-hidden="true"></span>
        <span class="antenna right" aria-hidden="true"></span>
        <div class="buddy-face">
          <span class="eye left"><span class="iris"></span><span class="shine"></span></span>
          <span class="eye right"><span class="iris"></span><span class="shine"></span></span>
          <span class="blush left" aria-hidden="true"></span>
          <span class="blush right" aria-hidden="true"></span>
          <span class="smile" aria-hidden="true"></span>
        </div>
      </div>
    </div>

    <!-- Expanded: bar top row, reply drops below (top-right anchor) -->
    <div id="expanded" class="card glass pip-surface pip-surface-expanded" aria-hidden="true">
      <div class="card-shell">
        <div class="card-row">
          <div class="card-main">
            <form id="ask-form" class="ask-form">
              <textarea id="ask-input" rows="1" placeholder="Ask Pip…" autocomplete="off" spellcheck="true"></textarea>
              <button type="button" id="btn-snip" class="icon-btn snip-btn" title="Snip screen (⌘⇧T)" aria-label="Snip">◫</button>
            </form>
          </div>
          <button type="button" id="btn-close" class="orb-dock" title="Minimize Pip" aria-label="Minimize Pip">
            <div class="buddy buddy-sm">
              <span class="antenna left" aria-hidden="true"></span>
              <span class="antenna right" aria-hidden="true"></span>
              <div class="buddy-face">
                <span class="eye left"><span class="iris"></span><span class="shine"></span></span>
                <span class="eye right"><span class="iris"></span><span class="shine"></span></span>
                <span class="blush left" aria-hidden="true"></span>
                <span class="blush right" aria-hidden="true"></span>
                <span class="smile" aria-hidden="true"></span>
              </div>
            </div>
          </button>
        </div>

        <div id="card-extras" class="card-extras" hidden>
          <div id="snip-panel" class="snip-panel glass-inset" hidden>
            <div class="snip-preview-wrap">
              <img id="snip-preview" alt="Screenshot preview" />
              <div id="snip-processing" class="snip-processing" hidden>
                <span class="snip-spinner" aria-hidden="true"></span>
                <span id="snip-status-text">Analyzing…</span>
              </div>
            </div>
          </div>
          <div id="nudge-hint" class="hint glass-inset" hidden></div>
          <div id="lens-task" class="lens-task glass-inset" hidden>
            <div class="lens-task-head">
              <span class="lens-badge">From the web</span>
              <span id="lens-task-title" class="lens-task-title"></span>
            </div>
            <a id="lens-task-source" class="lens-task-source" target="_blank" rel="noreferrer" hidden></a>
            <div id="lens-task-outcome" class="lens-task-outcome"></div>
            <div class="lens-task-actions">
              <button type="button" id="lens-open" class="lens-act">Open tasks.md</button>
              <button type="button" id="lens-done" class="lens-act">Mark done</button>
              <button type="button" id="lens-dismiss" class="lens-act lens-act-ghost">Dismiss</button>
            </div>
          </div>
          <div id="reply" class="reply glass-inset" hidden></div>
        </div>
      </div>
    </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
