<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pip · Tandem</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="mode-collapsed mood-rest dock-bottom">
    <div id="pip-stage" class="pip-stage">
    <div id="collapsed" class="pip-shell pip-surface pip-surface-collapsed" aria-label="Pip">
      <div class="buddy">
        <span class="ember" aria-hidden="true"></span>
        <div class="buddy-face">
          <span class="eye left"><span class="iris"></span><span class="shine"></span></span>
          <span class="eye right"><span class="iris"></span><span class="shine"></span></span>
          <span class="blush left" aria-hidden="true"></span>
          <span class="blush right" aria-hidden="true"></span>
          <span class="smile" aria-hidden="true"></span>
        </div>
      </div>
    </div>

    <!-- Expanded: bar top row, reply drops below (top-right anchor) -->
    <div id="expanded" class="card glass pip-surface pip-surface-expanded" aria-hidden="true">
      <div class="card-shell">
        <div class="card-row">
          <div class="card-main">
            <form id="ask-form" class="ask-form">
              <textarea id="ask-input" rows="1" placeholder="Ask Pip anything…" autocomplete="off" spellcheck="true"></textarea>
            </form>
          </div>
          <button type="button" id="btn-close" class="pip-dock" title="Pip — drag to move, click to minimize" aria-label="Minimize Pip">
            <div class="buddy buddy-sm">
              <span class="ember" aria-hidden="true"></span>
              <div class="buddy-face">
                <span class="eye left"><span class="iris"></span><span class="shine"></span></span>
                <span class="eye right"><span class="iris"></span><span class="shine"></span></span>
                <span class="blush left" aria-hidden="true"></span>
                <span class="blush right" aria-hidden="true"></span>
                <span class="smile" aria-hidden="true"></span>
              </div>
            </div>
          </button>
        </div>

        <div class="pip-toolbar">
          <button type="button" id="btn-mic" class="tool-btn mic-btn" title="Click to talk to Pip" aria-label="Talk to Pip" hidden>
            <svg class="tool-ico" viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="7.5" y="2.5" width="5" height="9" rx="2.5" />
              <path d="M4.5 9.5a5.5 5.5 0 0 0 11 0M10 15v2.5" />
            </svg>
            <span class="tool-label">Talk</span>
          </button>
          <button type="button" id="btn-snip" class="tool-btn snip-btn" title="Snip a screen area and ask Pip about it  (⌘⇧T)" aria-label="Snip a screen area">
            <svg class="tool-ico" viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6.5V4.5A1.5 1.5 0 0 1 4.5 3h2M13.5 3h2A1.5 1.5 0 0 1 17 4.5v2M17 13.5v2A1.5 1.5 0 0 1 15.5 17h-2M6.5 17h-2A1.5 1.5 0 0 1 3 15.5v-2" />
            </svg>
            <span class="tool-label">Snip</span>
          </button>
          <button type="button" id="btn-speak" class="tool-btn speak-btn" title="Speak replies aloud — off" aria-label="Toggle spoken replies" aria-pressed="false">
            <svg class="tool-ico" viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3.5 7.5v5h3l4 3.5v-12l-4 3.5z" />
              <path class="speak-wave" d="M13 7.5a4 4 0 0 1 0 5M15.2 5.5a7 7 0 0 1 0 9" />
            </svg>
            <span class="tool-label">Speak</span>
          </button>
          <button type="button" id="model-pill" class="tool-btn model-pill" title="Switch model — Pip runs on any model" aria-label="Switch model">
            <span class="model-dot" aria-hidden="true"></span>
            <span id="model-name" class="tool-label">auto</span>
          </button>
          <span class="tool-spacer"></span>
          <button type="button" id="btn-collapse" class="tool-btn tool-icon-only pip-close" title="Collapse Pip (Esc)" aria-label="Collapse Pip">
            <svg class="tool-ico" viewBox="0 0 14 14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
              <path d="M3.5 3.5l7 7M10.5 3.5l-7 7" />
            </svg>
          </button>
        </div>

        <div id="card-extras" class="card-extras" hidden>
          <div id="snip-panel" class="snip-panel glass-inset" hidden>
            <div class="snip-head">
              <span class="snip-head-label">
                <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2.5" y="4.5" width="15" height="11" rx="2" />
                  <circle cx="10" cy="10" r="2.75" />
                  <path d="M6.5 4.5l1-1.5h5l1 1.5" />
                </svg>
                Your snip
              </span>
              <button type="button" id="snip-clear" class="snip-clear" title="Discard this snip" aria-label="Discard snip">
                <svg viewBox="0 0 14 14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
                  <path d="M3.5 3.5l7 7M10.5 3.5l-7 7" />
                </svg>
              </button>
            </div>
            <div class="snip-preview-wrap">
              <img id="snip-preview" alt="Screenshot preview" />
              <div id="snip-processing" class="snip-processing" hidden>
                <span class="snip-spinner" aria-hidden="true"></span>
                <span id="snip-status-text">Analyzing…</span>
              </div>
            </div>
          </div>
          <div id="nudge-hint" class="hint glass-inset" hidden></div>
          <div id="lens-task" class="lens-task glass-inset" hidden>
            <div class="lens-task-head">
              <span class="lens-badge">From the web</span>
              <span id="lens-task-title" class="lens-task-title"></span>
            </div>
            <a id="lens-task-source" class="lens-task-source" target="_blank" rel="noreferrer" hidden></a>
            <div id="lens-task-outcome" class="lens-task-outcome"></div>
            <div class="lens-task-actions">
              <button type="button" id="lens-open" class="lens-act">Open tasks.md</button>
              <button type="button" id="lens-done" class="lens-act">Mark done</button>
              <button type="button" id="lens-dismiss" class="lens-act lens-act-ghost">Dismiss</button>
            </div>
          </div>
          <div id="reply" class="reply glass-inset" hidden></div>
        </div>
      </div>
    </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
